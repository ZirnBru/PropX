<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PropX — Find Your Next Landmark Property</title>
<link rel="stylesheet" href="assets/tokens/fonts.css">
<link rel="stylesheet" href="assets/tokens/colors.css">
<link rel="stylesheet" href="assets/tokens/typography.css">
<link rel="stylesheet" href="assets/tokens/spacing.css">
<link rel="stylesheet" href="assets/tokens/radius.css">
<link rel="stylesheet" href="assets/tokens/motion.css">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="cursor-dot" id="cursorDot" aria-hidden="true"></div>

<header class="nav">
  <div class="nav-inner">
    <a class="logo" href="#top">PropX</a>
    <nav class="nav-links" aria-label="Primary">
      <a href="contact.html">Contact</a>
    </nav>
    <div class="lang-switch">
      <a href="#" class="lang-active" aria-current="true">En</a>
      <span aria-hidden="true">/</span>
      <a href="#" dir="rtl" lang="ur">اردو</a>
    </div>
    <button class="hamburger" id="hamburgerBtn" aria-label="Open menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
  </div>
  <nav class="mobile-nav" id="mobileNav" hidden aria-label="Mobile">
    <a href="contact.html">Contact</a>
  </nav>
</header>

<div class="toolbar">
  <button class="text-btn" id="filterBtn" aria-haspopup="true" aria-controls="filterOverlay">Filter Properties <span>+</span></button>
  <button class="text-btn" id="viewToggleBtn" aria-pressed="false">Grid view <span>+</span></button>
</div>

<main class="stage" id="top" data-screen-label="ring-hero">
  <div class="center-content" id="centerContent">
    <div class="center-panel is-default" id="centerDefault">
      <h1>Find Your Next<br>Landmark Property.</h1>
      <p>Explore 300+ curated luxury residences, commercial spaces, villas, and investment-ready developments.</p>
    </div>
    <div class="center-panel is-active" id="centerActive" hidden>
      <h2 id="activeTitle"></h2>
      <div class="center-preview"><img id="activeImage" alt="" loading="lazy"></div>
      <p id="activeMeta"></p>
      <button class="cta" id="viewPropertyBtn" hidden>View Property <span>+</span></button>
    </div>
  </div>
  <div class="ring-viewport">
    <div class="ring" id="ring"></div>
  </div>
</main>

<p class="hint">MOVE TO EXPLORE · CLICK TO LOCK A PROPERTY</p>

<section class="grid-view" id="gridView" hidden data-screen-label="grid-view">
  <div class="grid-toolbar">
    <h2>All Properties</h2>
    <button class="text-btn" id="ringViewBtn">Ring view <span>+</span></button>
  </div>
  <div class="grid-wrap" id="gridWrap"></div>
  <button class="load-more" id="loadMoreBtn">Load more properties</button>
</section>

<footer class="site-footer">
  <div class="footer-inner">
    <div class="footer-brand">PropX</div>
  </div>
</footer>

<div class="filter-overlay" id="filterOverlay" hidden>
  <div class="filter-panel" role="dialog" aria-modal="true" aria-label="Filter properties">
    <div class="filter-head">
      <h2>Filter Properties</h2>
      <button class="close-btn" id="filterCloseBtn" aria-label="Close filters">×</button>
    </div>
    <div class="filter-body">
      <label class="filter-field">
        <span>Property Type</span>
        <select id="filterType"><option value="">All types</option></select>
      </label>
      <label class="filter-field">
        <span>Location</span>
        <select id="filterLocation"><option value="">All locations</option></select>
      </label>
      <label class="filter-field">
        <span>Budget</span>
        <select id="filterBudget">
          <option value="">Any budget</option>
          <option value="0-1">Under ₹1 Cr</option>
          <option value="1-3">₹1 Cr – ₹3 Cr</option>
          <option value="3-6">₹3 Cr – ₹6 Cr</option>
          <option value="6-999">₹6 Cr+</option>
        </select>
      </label>
      <label class="filter-field">
        <span>Status</span>
        <select id="filterStatus"><option value="">Any status</option></select>
      </label>
      <label class="filter-field">
        <span>Bedrooms</span>
        <select id="filterBedrooms">
          <option value="">Any</option>
          <option value="2">2 BHK</option>
          <option value="3">3 BHK</option>
          <option value="4">4 BHK</option>
          <option value="5">5+ BHK</option>
        </select>
      </label>
    </div>
    <div class="filter-actions">
      <button class="text-btn" id="filterResetBtn">Reset</button>
      <button class="cta" id="filterApplyBtn">Apply filters <span>+</span></button>
    </div>
  </div>
</div>

<script src="properties.js"></script>
<script src="script.js"></script>
</body>
</html>
